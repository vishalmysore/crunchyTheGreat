  <!-- markdown output -->
  <g font-family="ui-monospace, Consolas, monospace" font-size="12.5">
    <text x="628" y="332" fill="#ececec" font-weight="700"># PAY-1421 Async payment notification service</text>
    <text x="628" y="360" fill="#fb923c" font-weight="700">## Decisions</text>
    <text x="628" y="380" fill="#c9c9cf">- For the event backbone, let's use Kafka.</text>
    <text x="628" y="399" fill="#c9c9cf">- Rejected RabbitMQ; we already operate Kafka.</text>
    <text x="628" y="418" fill="#c9c9cf">- Use Redis for the delivery-attempt cache.</text>
    <text x="628" y="446" fill="#fb923c" font-weight="700">## Acceptance Criteria</text>
    <text x="628" y="466" fill="#c9c9cf">- Webhook within 5s of a payment state change</text>
    <text x="628" y="485" fill="#c9c9cf">- Retries w/ backoff up to 24h; HMAC-SHA256 signed</text>
    <text x="628" y="513" fill="#fb923c" font-weight="700">## Risks &amp; Dependencies</text>
    <text x="628" y="533" fill="#c9c9cf">- Retry-storm performance risk on the egress proxy</text>
    <text x="628" y="552" fill="#c9c9cf">- Blocked by PLAT-77 (service-mesh mTLS upgrade)</text>
    <text x="628" y="580" fill="#fb923c" font-weight="700">## Ignored Content</text>
    <text x="628" y="600" fill="#6b6b64">- 1.8KB log dump · 2 bots · 3 greetings · 1 duplicate</text>
  </g>
  <text x="628" y="648" font-size="12" fill="#6b6b64">confidence: 0.95 | compression: 74%</text>
</svg>
