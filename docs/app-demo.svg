  <g font-family="ui-monospace, Consolas, monospace" font-size="12.5" fill="#8a8a92">
    <text x="58" y="258">{ "key": "PAY-1421",</text>
    <text x="58" y="280">  "summary": "Async payment notification service",</text>
    <text x="58" y="302">  "description": "&lt;p&gt;We need a webhook so that ...",</text>
